
<style>
  * { box-sizing: border-box; }
  .wrap { padding: 1rem 0; font-family: var(--font-sans); }
  .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 1.25rem; align-items: center; }
  input[type="search"] { flex: 1; min-width: 180px; }
  select { min-width: 140px; }
  .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
  .badge-console   { background:#EEEDFE; color:#3C3489; }
  .badge-arcade    { background:#FAECE7; color:#712B13; }
  .badge-computer  { background:#E1F5EE; color:#085041; }
  .badge-vm        { background:#E6F1FB; color:#0C447C; }
  .badge-handheld  { background:#FBEAF0; color:#72243E; }
  .badge-multi     { background:#FAEEDA; color:#633806; }
  .badge-other     { background:#F1EFE8; color:#444441; }
  @media (prefers-color-scheme: dark) {
    .badge-console   { background:#26215C; color:#CECBF6; }
    .badge-arcade    { background:#4A1B0C; color:#F5C4B3; }
    .badge-computer  { background:#04342C; color:#9FE1CB; }
    .badge-vm        { background:#042C53; color:#B5D4F4; }
    .badge-handheld  { background:#4B1528; color:#F4C0D1; }
    .badge-multi     { background:#412402; color:#FAC775; }
    .badge-other     { background:#2C2C2A; color:#D3D1C7; }
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 9px 12px; font-weight: 500; font-size: 12px; color: var(--color-text-secondary); border-bottom: 1px solid var(--color-border-tertiary); white-space: nowrap; cursor: pointer; user-select: none; }
  th:hover { color: var(--color-text-primary); }
  td { padding: 8px 12px; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); vertical-align: top; line-height: 1.5; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--color-background-secondary); }
  .name a { font-weight: 500; color: var(--color-text-info); text-decoration: none; }
  .name a:hover { text-decoration: underline; }
  .oss  { color: var(--color-text-success); font-size: 11px; }
  .prop { color: var(--color-text-danger); font-size: 11px; }
  .free { color: var(--color-text-secondary); font-size: 11px; }
  .count { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 8px; }
  .platforms { display: flex; flex-wrap: wrap; gap: 4px; }
</style>

<div class="wrap">
  <div class="controls">
    <input type="search" id="search" placeholder="Search emulators..." oninput="render()">
    <select id="catFilter" onchange="render()">
      <option value="">All categories</option>
      <option value="Console">Console</option>
      <option value="Handheld">Handheld</option>
      <option value="Arcade">Arcade</option>
      <option value="Computer">Computer</option>
      <option value="VM">Virtual Machine</option>
      <option value="Multi">Multi-system</option>
      <option value="Other">Other</option>
    </select>
    <select id="licFilter" onchange="render()">
      <option value="">All licenses</option>
      <option value="Open Source">Open Source</option>
      <option value="Proprietary">Proprietary</option>
      <option value="Free">Free / Freeware</option>
    </select>
  </div>
  <div class="count" id="count"></div>
  <table>
    <thead>
      <tr>
        <th onclick="sort('name')">Name <span id="arr-name">↕</span></th>
        <th onclick="sort('cat')">Category <span id="arr-cat">↕</span></th>
        <th>Emulates</th>
        <th>Host Platforms</th>
        <th onclick="sort('license')">License <span id="arr-license">↕</span></th>
        <th>Notes</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

  { name:"EmulatorJS",        url:"https://emulatorjs.org",                       cat:"Multi",    emulates:"NES, SNES, GBA, N64, PS1, more",       platforms:["Web"],                              license:"Open Source", notes:"Browser-based, embeddable" },
  { name:"PCem",              url:"https://pcem-emulator.co.uk",                  cat:"Computer", emulates:"IBM PC XT/AT and compatibles",         platforms:["Windows","Linux"],                  license:"Open Source", notes:"Predecessor to 86Box" },
];

const catClass = { Console:'console', Handheld:'handheld', Arcade:'arcade', Computer:'computer', VM:'vm', Multi:'multi', Other:'other' };
const licClass  = { 'Open Source':'oss', 'Proprietary':'prop', 'Free':'free' };
let sortKey = 'name', sortDir = 1;

function sort(k) {
  if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = 1; }
  ['name','cat','license'].forEach(x => {
    const el = document.getElementById('arr-'+x);
    if (el) el.textContent = x === k ? (sortDir===1 ? '↑' : '↓') : '↕';
  });
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const lic = document.getElementById('licFilter').value;
  let rows = data.filter(r =>
    (!q || r.name.toLowerCase().includes(q) || r.emulates.toLowerCase().includes(q) || r.notes.toLowerCase().includes(q)) &&
    (!cat || r.cat === cat) &&
    (!lic || r.license === lic)
  );
  rows.sort((a,b) => {
    const av = a[sortKey]||'', bv = b[sortKey]||'';
    return typeof av === 'string' ? av.localeCompare(bv)*sortDir : (av-bv)*sortDir;
  });
  document.getElementById('count').textContent = `Showing ${rows.length} of ${data.length} entries`;
  document.getElementById('tbody').innerHTML = rows.map(r => `
    <tr>
      <td class="name"><a href="${r.url}" target="_blank" rel="noopener">${r.name}</a></td>
      <td><span class="badge badge-${catClass[r.cat]||'other'}">${r.cat}</span></td>
      <td style="color:var(--color-text-primary)">${r.emulates}</td>
      <td><div class="platforms">${r.platforms.map(p=>`<span class="badge badge-other">${p}</span>`).join('')}</div></td>
      <td><span class="${licClass[r.license]||'free'}">${r.license}</span></td>
      <td style="color:var(--color-text-secondary);font-size:12px">${r.notes}</td>
    </tr>
  `).join('');
}

render();
</script>
